<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - StudyForge AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="font-['Plus_Jakarta_Sans'] bg-slate-50">
    
    <!-- Simple Nav -->
    <nav class="bg-white border-b border-slate-200">
        <div class="max-w-4xl mx-auto px-4 py-4">
            <a href="/" class="text-xl font-bold text-slate-900">Study<span class="text-indigo-600">Forge</span></a>
        </div>
    </nav>
    
    <!-- Content -->
    <div class="max-w-4xl mx-auto px-4 py-16">
        <h1 class="text-4xl font-bold text-slate-900 mb-4">Contact Us</h1>
        <p class="text-lg text-slate-600 mb-12">Have questions? We're here to help.</p>
        
        <div class="grid md:grid-cols-2 gap-12">
            <!-- Contact Info -->
            <div>
                <h2 class="text-2xl font-bold text-slate-800 mb-6">Get in Touch</h2>
                
                <div class="space-y-6">
                    <div class="flex items-start gap-4">
                        <div class="w-10 h-10 rounded-lg bg-indigo-50 flex items-center justify-center">
                            <i class="fa-regular fa-envelope text-indigo-600"></i>
                        </div>
                        <div>
                            <h3 class="font-semibold text-slate-800">Email</h3>
                            <a href="mailto:byforgelabs@outlook.com" class="text-slate-600 hover:text-indigo-600">byforgelabs@outlook.com</a>
                        </div>
                    </div>
                    
                    <div class="flex items-start gap-4">
                        <div class="w-10 h-10 rounded-lg bg-indigo-50 flex items-center justify-center">
                            <i class="fa-brands fa-instagram text-indigo-600"></i>
                        </div>
                        <div>
                            <h3 class="font-semibold text-slate-800">Instagram</h3>
                            <a href="#" class="text-slate-600 hover:text-indigo-600">@studyforge.ai</a>
                        </div>
                    </div>
                    
                    <!-- <div class="flex items-start gap-4">
                        <div class="w-10 h-10 rounded-lg bg-indigo-50 flex items-center justify-center">
                            <i class="fa-regular fa-building text-indigo-600"></i>
                        </div>
                        <div>
                            <h3 class="font-semibold text-slate-800">Office</h3>
                            <p class="text-slate-600">Lagos, Nigeria</p>
                        </div>
                    </div> -->
                    
                    <div class="flex items-start gap-4">
                        <div class="w-10 h-10 rounded-lg bg-indigo-50 flex items-center justify-center">
                            <i class="fa-regular fa-clock text-indigo-600"></i>
                        </div>
                        <div>
                            <h3 class="font-semibold text-slate-800">Response Time</h3>
                            <p class="text-slate-600">Within 24 hours</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Quick Contact Form (Optional) -->
            <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200">
                <h2 class="text-2xl font-bold text-slate-800 mb-6">Send a Message</h2>
                <form action="https://formspree.io/f/xwpgdkwj" method="POST" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Name</label>
                        <input type="text" name="name" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                        <input type="email" name="email" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Message</label>
                        <textarea name="message" rows="4" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500/20"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition">
                        Send Message
                    </button>
                </form>
                <p class="text-xs text-slate-400 mt-4">Or just email us directly at byforgelabs@outlook.com</p>
            </div>
        </div>
    </div>
    
    <!-- Simple Footer -->
    <footer class="border-t border-slate-200 mt-12">
        <div class="max-w-4xl mx-auto px-4 py-8 text-center text-slate-500 text-sm">
            © 2026 StudyForge AI. All rights reserved.
        </div>
    </footer>
</body>
</html>
